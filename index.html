<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>thesis</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="editor" contenteditable="true" role="textbox" aria-multiline="true" aria-label="Document editor" placeholder="Start writing..."></div>
    <div id="command-modal" class="hidden" role="dialog" aria-label="Command palette">
        <div id="mode-status" role="status" aria-live="polite"></div>
        <input type="text" id="command-search" placeholder="Search commands..." autocomplete="off" aria-label="Search commands" role="combobox" aria-expanded="true" aria-controls="command-list">
        <div id="command-list" role="listbox" aria-label="Commands"></div>
    </div>
    <div id="recent-modal" class="hidden modal-overlay" role="dialog" aria-label="Open recent file">
        <div class="modal-content">
            <h3>Open Recent</h3>
            <input type="text" id="recent-search" placeholder="Search recent files..." autocomplete="off">
            <div id="recent-list" class="file-list"></div>
            <div class="modal-buttons">
                <button id="recent-cancel-button" class="modal-button">Cancel</button>
            </div>
        </div>
    </div>
    <div id="font-modal" class="hidden modal-overlay" role="dialog" aria-label="Select font">
        <div class="modal-content">
            <h3>Select Font</h3>
            <input type="text" id="font-search" placeholder="Search fonts or type custom font name..." autocomplete="off">
            <div id="font-list" class="font-list"></div>
            <div class="modal-buttons">
                <button id="font-cancel-button" class="modal-button">Cancel</button>
            </div>
        </div>
    </div>
    <div id="heading-modal" class="hidden modal-overlay" role="dialog" aria-label="Jump to heading">
        <div class="modal-content">
            <h3>Jump to Heading</h3>
            <input type="text" id="heading-search" placeholder="Search headings..." autocomplete="off">
            <div id="heading-list" class="heading-list"></div>
            <div class="modal-buttons">
                <button id="heading-cancel-button" class="modal-button">Cancel</button>
            </div>
        </div>
    </div>
    <div id="intro-modal" class="hidden modal-overlay" role="dialog" aria-label="Introduction">
        <div class="modal-content intro-content">
            <div id="intro-text"></div>
        </div>
    </div>
    <div id="dialog-modal" class="hidden modal-overlay" role="alertdialog" aria-label="Dialog">
        <div class="modal-content dialog-content">
            <div id="dialog-message"></div>
            <div class="modal-buttons">
                <button id="dialog-confirm-button" class="modal-button primary">OK</button>
                <button id="dialog-cancel-button" class="modal-button">Cancel</button>
            </div>
        </div>
    </div>
    <div id="retype-bar" class="hidden" role="complementary" aria-label="Source paragraph to retype">
        <div id="retype-text"></div>
        <div id="retype-meta">
            <span id="retype-counter"></span>
            <span class="retype-hint">⌘↓ next · ⌘↑ back · ⌘. finish</span>
        </div>
    </div>
    <div id="blind-overlay" class="hidden" aria-hidden="true"><span id="blind-char"></span></div>
    <div id="find-bar" class="hidden" role="search" aria-label="Find in document">
        <input type="text" id="find-input" placeholder="Find..." autocomplete="off" aria-label="Find text">
        <span id="find-count" aria-live="polite"></span>
    </div>
    <div id="word-count-display" class="hidden">
        <span id="word-count">0 words</span>
        <span class="separator">•</span>
        <span id="char-count">0 characters</span>
    </div>
    <input type="file" id="markdown-file-input" accept=".md,.markdown" style="display: none;">
    <script type="module" src="js/app.js"></script>
</body>
</html>
